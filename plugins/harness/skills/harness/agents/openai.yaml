interface:
  display_name: "Harness"
  short_description: "6-agent sprint orchestration harness for long-running apps"
  default_prompt: "Use $harness to orchestrate multi-agent sprints. Available commands: /init (scaffold), /session (one supervised round), /run (continuous unattended), /reset (checkpoint + handoff). Dispatches 6 agents: initializer, planner, generator, evaluator, coordinator, and releaser. The evaluator handles testing, code review, and grading in one pass. Requires explicit execution strategy, defaults to one failing required feature per sprint unless a written grouping waiver exists, and requires quantified evaluator grading with integer 0-5 primary scores plus matching Markdown and JSON artifacts before any feature flips to passing."
