interface:
  display_name: "Harness"
  short_description: "Multi-agent sprint orchestration harness for long-running apps"
  default_prompt: "Use $harness to orchestrate multi-agent sprints. Available commands: /harness:init (scaffold), /harness:session (one supervised round), /harness:run (continuous unattended), /harness:reset (checkpoint + handoff). Dispatches initializer, planner, generator, evaluator, and coordinator roles. Requires explicit execution strategy, defaults to one failing required feature per sprint unless a written grouping waiver exists, and requires quantified evaluator grading with integer 0-5 primary scores plus matching Markdown, JSON, and replayable evaluator-step artifacts before any feature flips to passing."
